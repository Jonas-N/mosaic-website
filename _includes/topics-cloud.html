<section class="topics" aria-labelledby="topics-heading">
  <h2 id="topics-heading">Topics</h2>
  <p class="topics-intro">MOSAIC topics include but are not limited to:</p>

  <div id="topics-cloud" class="topics-cloud" role="img" aria-label="Word cloud of MOSAIC session topics"></div>

  <div id="topics-years" class="topics-years" role="group" aria-label="Filter topics by year"></div>
  <p class="topics-hint">Click on a year to see what topics we discussed.</p>

  <script type="application/json" id="mosaic-events-data">
[
{% for e in site.events %}
  {
    "year": {{ e.date | date: "%Y" | jsonify }},
    "title": {{ e.title | jsonify }},
    "summary": {{ e.summary | default: "" | jsonify }},
    "talks": [
      {%- assign first_talk = true -%}
      {%- if e.speakers -%}
        {%- for s in e.speakers -%}
          {%- if s.talk and s.talk != "" -%}
            {%- unless first_talk -%},{%- endunless -%}
            {{ s.talk | jsonify }}
            {%- assign first_talk = false -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}
    ]
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
]
  </script>
  <script src="{{ '/assets/js/topics-cloud.js' | relative_url }}" defer></script>
</section>
