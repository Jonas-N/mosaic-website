<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.summary | default: site.description | strip_newlines }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="text/calendar" title="MOSAIC events" href="{{ site.google_calendar_ical_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">MOSAIC</span>
        <span class="brand-sub">{{ site.tagline }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/events/' | relative_url }}">Events</a>
        <a href="{{ '/calendar/' | relative_url }}">Calendar</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main class="wrap" id="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>
        <strong>{{ site.title }}</strong> — {{ site.tagline }}, {{ site.institution }}.
      </p>
      <p class="footer-links">
        <a href="{{ '/calendar/' | relative_url }}">Subscribe to the calendar</a>
        <span aria-hidden="true">·</span>
        <a href="mailto:{{ site.mailing_list_signup_email }}?subject=Join%20the%20MOSAIC%20mailing%20list">Join the mailing list</a>
        <span aria-hidden="true">·</span>
        <a href="{{ site.social.twitter }}" rel="me noopener" target="_blank">X / Twitter</a>
        <span aria-hidden="true">·</span>
        <a href="{{ site.social.bluesky }}" rel="me noopener" target="_blank">Bluesky</a>
      </p>
    </div>
  </footer>
</body>
</html>
